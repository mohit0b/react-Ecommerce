<!DOCTYPE html>
<html>
  <head>
    <title>ChatBoT</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">

        function LoginForm(){
            return(
                <>
                    <p>Hello Welcome to my website</p>
                    <div>
                        <input type="Email" placeholder="Email"/>
                    </div>

                    <div>
                        <input type="password" placeholder="password"/>
                    </div>
                    <button>login</button>
                    <button>SignUp</button>
                </>
            );
        }

        function ProductPage({name,price,discountPrice,imageSrc}){
            return (
                <div>  

                    
                   
                    <img src={imageSrc} width="150"></img>
                    <p>{name}</p>
                    {discountPrice?(
                        <>
                            {discountPrice && (<del>Price: ${price}</del>)}
                            {discountPrice && (<p>Discount price: ${discountPrice}</p>)}
                        </>
                    ):(
                        <>
                            {!discountPrice && (<p>Price: ${price}</p>)}
                        </>
                    )}
                    
                    <button>Add to Cart</button>
                </div>
            );
        }
     
      function App(){
        return (
           <>
                <ProductPage name= "Plain T-shirt" price="10.90" imageSrc= "plain-t-shirt.png" />
                <ProductPage name= "Cotton-Socks" price="7.99" discountPrice= "5.45" imageSrc= "cotton-socks.png" />
            </>
        )
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />)

    </script>
  </body>
</html>
