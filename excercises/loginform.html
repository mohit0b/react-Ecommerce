<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        .main-line{
            font-family: Arial;
            font-size: 25px;
        }
        .email-input{
            padding:8px 18px;
            border-width:1px;
            border-radius:4px;
        }
        .password-input{
            padding:8px 18px;
            margin-top:10px;
            border-radius:4px;
        }
        .login-button{
            margin-top:20px;
            padding:8px 18px;
            border:none;
            border-radius:4px;
            background-color: rgb(0,123,255);
            color:white;
        }
        .signup-button{
            margin-top:20px;
            margin-left:10px;
            padding:8px 18px;
            border:none;
            border-radius:4px;
            background-color: rgb(0,123,255);
            color:white;
        }
        .show-button{
            margin-left:10px;
            padding:8px 18px;
            border:none;
            border-radius:4px;
            background-color: rgb(0,123,255);
            color:white;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function LoginForm() {

        const[showPassword,setPassword] = React.useState(true);

        function show(){
            if(showPassword){
                setPassword(false)
            }else{
                setPassword(true)
            }
        }
        return (
          <>
            <div>
              <input placeholder="Email" className="email-input" />
            </div>
            <div>
              <input placeholder="Password" type={showPassword ?"password":"text"}className="password-input"/>
              <button className="show-button" onClick={show}>{showPassword?"show":"hide"}</button>
            </div>
            <button className="login-button">Login</button>
            <button className="signup-button">Sign up</button>
          </>
        );
      }

      function App() {
        return (
          <>
            <p className="main-line">Hello, welcome to my website</p>
            <LoginForm />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
